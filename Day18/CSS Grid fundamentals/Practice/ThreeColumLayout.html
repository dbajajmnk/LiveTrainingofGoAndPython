<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Columns</title>
    <style>
        .container{
            display: grid;
            grid-template-rows: repeat(1,1fr);
           
        }
        .header {
            width: 100%;
            height: 20%;
            background-color: red;
        }
        .content {
            width: 100%;
            height: 60%;
            background-color: black;
        }
        .footer{
            width: 100%;
            height: 20%;
            background-color: gray;
        }


    </style>
</head>
<body class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    
</body>
</html>
