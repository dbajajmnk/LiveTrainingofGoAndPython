<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Styling</title>
    <style>
        .red {
  color: red;
}
    </style>
</head>
<body>
    
<p>Style will apply here Dynamically</p>


<script>
const elementBytag= document.getElementsByTagName("p");
elementBytag[0].classList.add("red");

</script>

</body>
</html>
