<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efficient Animation</title>
    <style>
div {
  transition: transform 0.3s;
  width: 100px;
  height:100px;
  background-color: red;
}

div:hover {
  transform: scale(1.1);

}
    </style>
</head>
<body>
    <div>One</div>
</body>
</html>
