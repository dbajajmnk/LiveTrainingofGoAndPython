<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        form { display: flex; flex-direction: column; gap: 10px; width: 250px; }
        input, button, a { padding: 8px; cursor: pointer; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <form id="registerForm">
        <input type="text" id="newName" placeholder="Username" required>
        <input type="email" id="newEmail" placeholder="Email Address" required>
        <input type="tel" id="newPhone" placeholder="Phone Number" required>
        <input type="password" id="newPass" placeholder="Password" required>
        <button type="submit">Create Account</button>
        <a href="index.html">Back to Login</a>
    </form>
    <p id="regMessage"></p>
    <script src="register.js"></script>
</body>
</html>
