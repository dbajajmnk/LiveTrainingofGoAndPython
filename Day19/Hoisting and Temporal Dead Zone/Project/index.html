<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; transition: background 0.3s; }
        form { display: flex; flex-direction: column; gap: 10px; width: 250px; }
        input, button, a { padding: 8px; text-align: center; text-decoration: none; cursor: pointer; }
        #message { margin-top: 15px; font-weight: bold; }
        .register-btn { background: #eee; border: 1px solid #ccc; color: black; margin-top: 5px; font-size: 13px; }
    </style>
</head>
<body>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <button type="reset" id="resetBtn">Reset</button>
        <a href="register.html" class="register-btn">Create Account</a>
    </form>
    <p id="message"></p>
    <script src="main.js"></script>
</body>
</html>
